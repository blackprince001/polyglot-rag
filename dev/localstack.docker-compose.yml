services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: pgvector_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

  text-embeddings-inference:
    image: ghcr.io/huggingface/text-embeddings-inference:1.8
    volumes:
      - ./data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1
    command: --model-id Qwen/Qwen3-Embedding-0.6B
    networks:
      - app-network

  localstack:
    image: localstack/localstack:4.0
    container_name: polyrag_localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./localstack/ready.d:/etc/localstack/init/ready.d
    ports:
      - "4566:4566"
    networks:
      - app-network

  polyrag:
    build:
      context: ../
      dockerfile: dockerfile
    container_name: polyrag
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres/postgres
      - EMBEDDINGS_SERVICE_URL=http://text-embeddings-inference
      - PORT=9000
      - RUST_BACKTRACE=1
      - STORAGE_BACKEND=s3
      - S3_BUCKET=polyrag-local
      - S3_REGION=us-east-1
      - S3_ENDPOINT=http://localstack:4566
      - S3_FORCE_PATH_STYLE=true
      - S3_ACCESS_KEY_ID=test
      - S3_SECRET_ACCESS_KEY=test
      - HOST=0.0.0.0
      - WORKER_COUNT=3
      - UPLOAD_DIR=./uploads
      - CORS_ALLOWED_ORIGINS=
      - TENANT_MANAGEMENT_KEY=
      - PRESIGNED_UPLOAD_TTL_SECS=900
      - PRESIGNED_DOWNLOAD_TTL_SECS=300
      - CHUNK_SIZE=200
      - CHUNK_OVERLAP=50
      - MAX_CHUNKS_PER_DOCUMENT=
      - MIN_CHUNK_SIZE=100
      - JANITOR_INTERVAL_SECS=300
      - JANITOR_DANGLING_THRESHOLD_SECS=
      - JANITOR_STALE_PROCESSING_SECS=1800
    ports:
      - "9000:9000"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
